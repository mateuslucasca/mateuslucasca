<svg fill="none" viewBox="0 0 600 40" width="600" height="40" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" class="container">
      <style>
        .container {
          width: 100%;
          height: 100%;
          display: flex;
          justify-content: center;
          align-items: center;
          text-align: center;
        }

        strong {
          font-family: "Comic Sans MS", Chalkboard, cursive, sans-serif;
          color: limegreen;
          font-size: 1.5em;
        }

        .blink {
          display: inline-block;
          animation: blink-animation 1s steps(1, start) infinite;
        }

        @keyframes blink-animation {
          50% {
            opacity: 0;
          }
        }
      </style>

      <strong>
        My Name is Mateus Lucas and I like <span class="blink">C++</span>
      </strong>
    </div>
  </foreignObject>
</svg>
